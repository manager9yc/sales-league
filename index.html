<style>
:root {
  --orange: #FF6B00;
  --orange2: #FF8C00;
  --dark: #080808;
  --card: #121212;
  --card2: #1a1a1a;
  --border: #282828;
  --muted: #999;
  --text: #f0f0f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
html { overflow-x: hidden; max-width: 100vw; }
body { background: var(--dark); background-image: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 60%); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; max-width: 100vw; padding-bottom: calc(68px + env(safe-area-inset-bottom, 0px)); }

/* NAV */
.nav { display: flex; background: linear-gradient(180deg, #1a1410, #0a0a0a); border: 1px solid rgba(201,168,76,0.35); border-radius: 50px; position: fixed; bottom: 18px; left: 12px; right: 12px; z-index: 9000; align-items: center; height: 64px; padding: 0 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(201,168,76,0.08); padding-bottom: env(safe-area-inset-bottom, 0px); }
.nav-btn { flex: 1; height: 100%; border: none; background: transparent; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: color 0.2s; }
.nav-btn.active { color: #C9A84C; }
.nav-icon { font-size: 20px; line-height: 1; display: block; }
