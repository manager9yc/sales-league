<style>
:root {
  --orange: #FF6B00;
  --orange2: #FF8C00;
  --dark: #0C0C0C;
  --card: #161616;
  --card2: #1e1e1e;
  --border: #2c2c2c;
  --muted: #999;
  --text: #f0f0f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* NAV */
.nav { display: flex; background: #0a0a0a; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
.nav-btn { flex: 1; padding: 10px 4px 6px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); border: none; background: transparent; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.nav-btn.active { color: #fff; border-bottom-color: var(--orange); }

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; }

/* ══ FORM HEADER ══ */
.f-header { background: var(--orange); padding: 32px 20px 38px; text-align: center; position: relative; overflow: hidden; }
.f-header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, transparent, transparent 18px, rgba(0,0,0,0.06) 18px, rgba(0,0,0,0.06) 20px); }
.f-header::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 16px; background: var(--dark); clip-path: polygon(0 100%, 100% 100%, 100% 0, 50% 100%, 0 0); }
.f-header-inner { position: relative; z-index: 2; }

.sz-logo { display: inline-flex; flex-direction: column; align-items: flex-start; background: white; padding: 8px 14px; border-radius: 6px; margin-bottom: 14px; line-height: 1; }
.sz-logo span:first-child { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 600; color: var(--orange); letter-spacing: 2px; text-transform: uppercase; }
.sz-logo span:last-child { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; color: var(--orange); letter-spacing: 2px; text-transform: uppercase; margin-top: -2px; }

.f-title { font-family: 'Bebas Neue', sans-serif; font-size: 54px; letter-spacing: 3px; line-height: 1; color: #fff; text-shadow: 0 3px 0 rgba(0,0,0,0.2); }
.f-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-top: 6px; }

.form-wrap { max-width: 900px; margin: 0 auto; padding: 28px 40px 80px; }
.sec-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; margin-top: 28px; }
.sec-label:first-of-type { margin-top: 0; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 10px; }

.date-row { display: flex; align-items: center; gap: 12px; }
.date-icon { width: 42px; height: 42px; background: var(--orange); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.date-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
input[type="date"] { background: transparent; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 600; outline: none; width: 100%; cursor: pointer; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.4); cursor: pointer; }

.team-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.team-tab { background: var(--card2); border: 1.5px solid var(--border); border-radius: 20px; color: var(--muted); font-size: 12px; font-weight: 600; padding: 7px 13px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; font-family: 'DM Sans', sans-serif; }
.team-tab.active { background: var(--orange); border-color: var(--orange); color: #fff; }

.name-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; min-height: 44px; }
.name-btn { background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
.name-btn.selected { background: var(--orange); border-color: var(--orange); color: #fff; }
.name-empty { color: var(--muted); font-size: 13px; font-style: italic; grid-column: span 2; text-align: center; padding: 10px 0; }

.prod-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); }
.prod-row:last-child { border-bottom: none; padding-bottom: 0; }
.prod-row:first-child { padding-top: 0; }
.prod-info { display: flex; align-items: center; gap: 12px; }
.prod-emoji { font-size: 20px; width: 38px; height: 38px; background: var(--card2); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.prod-name { font-size: 15px; font-weight: 600; }
.prod-hint { font-size: 11px; color: var(--muted); margin-top: 1px; }

.counter { display: flex; align-items: center; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; flex-shrink: 0; }
.cbtn { width: 38px; height: 38px; background: transparent; border: none; color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: background 0.1s; -webkit-user-select: none; user-select: none; }
.cbtn:active { background: var(--border); }
.cbtn.minus { color: var(--muted); }
.cbtn.plus { color: var(--orange); }
.cval { min-width: 34px; text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1); }
.cval.nz { color: var(--orange); }
.cval.bump { transform: scale(1.5); }

.submit-btn { width: 100%; background: var(--orange); border: none; border-radius: 14px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; padding: 18px; margin-top: 28px; cursor: pointer; transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(255,107,0,0.35); }
.submit-btn:hover { box-shadow: 0 6px 28px rgba(255,107,0,0.55); }
.submit-btn:active { opacity: 0.88; transform: scale(0.98); }
.submit-btn.loading { background: #28a745; box-shadow: 0 4px 20px rgba(40,167,69,0.4); transform: scale(0.98); }

.success { display: none; padding: 0 0 40px; }
.success.show { display: block; animation: fadeUp 0.4s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.success-icon { font-size: 56px; display: block; animation: bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes bounceIn { from { transform:scale(0); } to { transform:scale(1); } }
.success h2 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #fff; margin-bottom: 4px; }
.success p { color: var(--muted); font-size: 15px; }
.form-main.hide { display: none; }

.toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(80px); background: #fff; color: var(--dark); border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 30px rgba(0,0,0,0.4); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 200; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ══ RANKING HERO ══ */
.rank-hero { background: var(--dark); padding: 36px 20px 32px; text-align: center; position: relative; overflow: hidden; }
.rank-hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,107,0,0.13) 0%, transparent 55%), linear-gradient(315deg, rgba(255,107,0,0.05) 0%, transparent 50%); }

.hero-slashes { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.hs { position: absolute; background: var(--orange); }
.hs1 { width: 2px; height: 200%; top:-50%; left:18%; transform:rotate(20deg); opacity:.12; }
.hs2 { width: 5px; height: 200%; top:-50%; left:22%; transform:rotate(20deg); opacity:.05; }
.hs3 { width: 2px; height: 200%; top:-50%; right:18%; transform:rotate(-20deg); opacity:.12; }
.hs4 { width: 5px; height: 200%; top:-50%; right:22%; transform:rotate(-20deg); opacity:.05; }
.hs5 { width: 100px; height: 3px; top:28%; left:-5%; transform:rotate(20deg); opacity:.2; }

.cat-block { margin-bottom: 24px; opacity: 0; transform: translateY(18px); animation: slideUp 0.5s cubic-bezier(0.23,1,0.32,1) forwards; }

.last-up { text-align: right; font-size: 10px; color: var(--muted); margin-top: 5px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase; padding-right: 2px; }

.print-btn { position: fixed; bottom: 20px; right: 18px; background: var(--orange); color: #fff; border: none; border-radius: 50px; padding: 12px 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 20px rgba(255,107,0,0.5); z-index: 40; display: none; align-items: center; gap: 6px; transition: transform 0.15s, box-shadow 0.15s; }

}
@media print {

  body { background: #fff !important; color: #000 !important; font-size: 12px; }
  .rank-hero { background: #000 !important; padding: 20px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .rank-title { font-size: 48px !important; color: #fff !important; }

  .rank-main { padding: 10px 0 !important; max-width: 100% !important; }
  .cat-block { break-inside: avoid; opacity: 1 !important; transform: none !important; animation: none !important; margin-bottom: 16px !important; }
  .cat-head { background: #000 !important; border: 1px solid #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cat-name { color: #fff !important; font-size: 18px !important; }
  .cat-emoji { display: none; }
  .cat-head::after { display: none !important; }
  .rank-table { background: #fff !important; border: 1px solid #ccc !important; }
  .rank-table tbody tr { border-bottom: 1px solid #ccc !important; background: #fff !important; }
  .rank-1 { background: #f0f0f0 !important; }
  .td-name { color: #000 !important; font-size: 13px !important; }
  .td-score { color: #000 !important; font-size: 16px !important; font-weight: bold; }
  .td-pos { color: #000 !important; }
  .bar-bg { background: #ddd !important; }
  .bar-fg { background: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .last-up { color: #666 !important; }
  .sec-divider { background: #eee !important; border: 1px solid #ccc !important; border-left: 4px solid #000 !important; }

  .hero-slashes { display: none !important; }
  @page { margin: 1cm; size: A4; }
}

/* ══ DASHBOARD ══ */
.dash-wrap { max-width: 900px; margin: 0 auto; padding: 0 0 80px; }
/* MODAL */

.modal-head { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

.svb-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--card2); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--orange); flex-shrink: 0; }

.d-slabel { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; margin-top: 20px; }
.d-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 20px; }
.d-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff; margin-bottom: 14px; }

.d-bbar { height: 100%; background: var(--orange); border-radius: 3px; transition: width 0.8s ease; }
.d-bval { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text); width: 32px; text-align: right; flex-shrink: 0; }
.d-hrow { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }

.d-hmonth { font-size: 14px; font-weight: 600; }

.d-hbadge { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: rgba(255,107,0,0.15); color: var(--orange); border-radius: 10px; padding: 3px 8px; }

/* ══ METAS / PROGRESS ══ */
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }

@media(min-width:700px){ .meta-grid { grid-template-columns: repeat(4,1fr); } }
.meta-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }

/* ══ RECORDE TOAST ══ */
.record-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #FF6B00, #FF8C00); color: #fff; border-radius: 20px; padding: 20px 28px; font-size: 15px; font-weight: 600; box-shadow: 0 12px 40px rgba(255,107,0,0.6); z-index: 9999; text-align: center; min-width: 260px; max-width: 90vw; opacity: 0; pointer-events: none; transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1); transform: translate(-50%, -40%); }

.record-toast .rt-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; display: block; margin-bottom: 4px; }

/* ══ PIN LOCK ══ */
.pin-overlay { position:relative; background:transparent; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px 40px; }
.pin-overlay.hidden { display:none; }
.pin-icon { font-size:48px; margin-bottom:16px; }
.pin-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:#fff; margin-bottom:6px; }
.pin-sub { font-size:13px; color:var(--muted); margin-bottom:24px; }
.pin-dots { display:flex; gap:12px; margin-bottom:24px; }
.pin-dot { width:14px; height:14px; border-radius:50%; background:var(--border); transition:background 0.15s; }
.pin-dot.filled { background:var(--orange); }
.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:240px; width:100%; }
.pin-key { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; font-family:'Bebas Neue',sans-serif; font-size:24px; color:#fff; cursor:pointer; text-align:center; transition:all 0.1s; -webkit-tap-highlight-color:transparent; }
.pin-key:active { background:var(--orange); border-color:var(--orange); transform:scale(0.95); }

.pin-error { color:#FF4444; font-size:13px; margin-top:12px; min-height:18px; }

/* SPLASH */
.splash{position:fixed;inset:0;z-index:9999;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0;transition:opacity 0.6s ease;}
.splash.out{opacity:0;pointer-events:none;}
.splash.hidden{display:none;}
.sp-slash{position:absolute;background:var(--orange);}
.ss1{width:4px;height:200%;top:-50%;left:18%;transform:rotate(20deg);opacity:.12;}
.ss2{width:8px;height:200%;top:-50%;left:23%;transform:rotate(20deg);opacity:.06;}
.ss3{width:4px;height:200%;top:-50%;right:18%;transform:rotate(-20deg);opacity:.12;}
.ss4{width:8px;height:200%;top:-50%;right:23%;transform:rotate(-20deg);opacity:.06;}
.ss5{width:140px;height:4px;top:28%;left:-5%;transform:rotate(20deg);opacity:.18;}
.sp-inner{position:relative;z-index:2;}
.sp-pre{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:16px;}
.sp-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,18vw,110px);color:#fff;line-height:0.9;letter-spacing:3px;text-shadow:0 4px 0 rgba(0,0,0,0.3),0 0 40px rgba(255,107,0,0.4);animation:splashIn 0.8s cubic-bezier(0.34,1.2,0.64,1) forwards;}
@keyframes splashIn{from{opacity:0;transform:scale(0.8) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.sp-sub{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:6px;text-transform:uppercase;color:var(--orange);margin-top:12px;}
.sp-bar-wrap{background:var(--orange);margin-top:28px;padding:10px 32px;display:inline-flex;align-items:center;gap:12px;}
.sp-bar-wrap span{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:#fff;}
.sp-progress{width:220px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin-top:20px;overflow:hidden;margin-left:auto;margin-right:auto;}
.sp-progress-fill{height:100%;background:#fff;border-radius:2px;width:0%;transition:width 0.1s linear;}
.sp-btn{margin-top:18px;background:transparent;border:1.5px solid rgba(255,255,255,0.25);border-radius:10px;padding:12px 28px;color:rgba(255,255,255,0.7);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.sp-btn:hover,.sp-btn:active{border-color:var(--orange);color:#fff;}
.sp-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.sp-particle{position:absolute;border-radius:50%;background:var(--orange);opacity:0;animation:particleFloat linear infinite;}
@keyframes particleFloat{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:0.7}90%{opacity:0.3}100%{opacity:0;transform:translateY(-20px) scale(1)}}

/* MEDAL POPUP */
.medal-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-40%);background:linear-gradient(135deg,#FF6B00,#FF8C00);border-radius:20px;padding:24px 32px;text-align:center;z-index:8888;min-width:280px;max-width:90vw;opacity:0;pointer-events:none;transition:opacity 0.4s ease,transform 0.45s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 16px 50px rgba(255,107,0,0.6);}
.medal-popup.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%);}
.medal-popup-trophy{font-size:56px;display:block;margin-bottom:10px;}
.medal-popup-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;display:block;margin-bottom:6px;}
.medal-popup-sub{font-size:14px;color:rgba(255,255,255,0.9);}
.medal-confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:20px;}
.medal-dot{position:absolute;width:8px;height:8px;border-radius:2px;animation:mDotFall 1.5s ease-out forwards;}
.medal-star{position:absolute;animation:mStarFloat 1.3s ease-out forwards;font-size:18px;pointer-events:none;}
@keyframes trophyBounce{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg)}80%{transform:scale(0.9)}100%{transform:scale(1);opacity:1}}
@keyframes mStarFloat{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(-70px) rotate(360deg)}}
@keyframes mDotFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(90px) rotate(720deg);opacity:0}}
.trophy-anim{animation:trophyBounce 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;}

/* RANKING COUNTDOWN */
.rank-countdown{background:rgba(255,255,255,0.12);border-radius:20px;padding:4px 12px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:1px;white-space:nowrap;}

/* RANKING ANIMATION */
.rank-table tbody tr{opacity:0;transform:translateY(8px);}
.rank-table tbody tr.row-visible{opacity:1;transform:translateY(0);transition:opacity 0.35s ease,transform 0.35s ease;}

/* LEVEL + STREAK */
.nivel-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;}
.nivel-bronze{background:rgba(205,127,50,0.15);border:1px solid rgba(205,127,50,0.4);color:#CD7F32;}
.nivel-silver{background:rgba(192,192,192,0.15);border:1px solid rgba(192,192,192,0.4);color:#C0C0C0;}
.nivel-gold{background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.4);color:#FFD700;}
.nivel-diamond{background:rgba(100,200,255,0.15);border:1px solid rgba(100,200,255,0.4);color:#64C8FF;}
.streak-card{background:linear-gradient(135deg,rgba(255,107,0,0.12),rgba(255,107,0,0.03));border:1px solid rgba(255,107,0,0.25);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}

/* LAST REGISTO */
.last-reg-bar{background:rgba(255,107,0,0.06);border:1px solid rgba(255,107,0,0.2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}

/* TEAM COMPARE */
.team-bar-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.team-bar-row:last-child{border-bottom:none;}
.team-bar-name{font-size:13px;font-weight:600;width:110px;flex-shrink:0;}
.team-bar-bg{flex:1;height:20px;background:var(--card2);border-radius:4px;overflow:hidden;}
.team-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--orange),var(--orange2));transition:width 1.2s ease;}
.team-bar-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);width:36px;text-align:right;flex-shrink:0;}

/* ADMIN SUMMARY */
.admin-sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
@media(min-width:500px){.admin-sum-grid{grid-template-columns:repeat(4,1fr);}}
.admin-sum-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.admin-sum-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--orange);}
.admin-sum-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.top3-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border-radius:10px;margin-bottom:6px;}
.top3-pos{font-size:20px;width:28px;flex-shrink:0;}
.top3-name{font-size:14px;font-weight:600;flex:1;}
.top3-score{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--orange);}

/* INSTALL POPUP */
.install-popup { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 2px solid var(--orange); padding: 20px; z-index: 10000; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1); }
.install-popup.show { transform: translateY(0); }
.install-popup-inner { max-width: 500px; margin: 0 auto; }
.install-popup-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: #fff; margin-bottom: 4px; }
.install-popup-sub { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.install-popup-ios { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 14px; }
.install-popup-btns { display: flex; gap: 8px; }
.install-popup-btn-main { flex: 1; background: var(--orange); border: none; border-radius: 10px; padding: 12px; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
.install-popup-btn-close { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--muted); font-size: 13px; cursor: pointer; }

/* GESTÃO VENDEDORES */
.gestao-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;}
.gestao-nome{flex:1;font-size:14px;font-weight:600;color:var(--text);}
.gestao-equipa{font-size:11px;color:var(--muted);margin-top:1px;}
.gestao-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.gestao-btn:hover{border-color:var(--orange);color:var(--orange);}
.gestao-btn.danger:hover{border-color:#FF4444;color:#FF4444;}
.gestao-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:5000;display:none;align-items:center;justify-content:center;padding:20px;}
.gestao-modal.open{display:flex;}
.gestao-modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:400px;padding:24px;}
.gestao-modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;margin-bottom:16px;}
.gestao-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:10px;}
.gestao-input:focus{border-color:var(--orange);}
.gestao-select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:16px;}
.gestao-modal-btns{display:flex;gap:8px;}
.gestao-confirm-btn{flex:1;background:var(--orange);border:none;border-radius:8px;padding:12px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;}
.gestao-cancel-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--muted);font-size:13px;cursor:pointer;}

/* GESTÃO DADOS */
.dados-tab { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.dados-tab-btn { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.dados-tab-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
.dados-registo-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.dados-registo-info { flex: 1; min-width: 120px; }
.dados-registo-nome { font-size: 13px; font-weight: 600; color: var(--text); }
.dados-registo-data { font-size: 11px; color: var(--muted); margin-top: 1px; }
.dados-registo-vals { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.dados-registo-val { font-size: 11px; background: var(--card2); border-radius: 5px; padding: 2px 7px; color: var(--muted); }
.dados-registo-val.nz { color: var(--orange); background: rgba(255,107,0,0.1); }
.dados-registo-btns { display: flex; gap: 6px; flex-shrink: 0; }
.dados-btn-edit { background: transparent; border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px; font-size: 12px; color: var(--muted); cursor: pointer; }
.dados-btn-edit:hover { border-color: var(--orange); color: var(--orange); }
.dados-btn-del { background: transparent; border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px; font-size: 12px; color: var(--muted); cursor: pointer; }
.dados-btn-del:hover { border-color: #FF4444; color: #FF4444; }
.confirm-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
.confirm-modal.open { display: flex; }
.confirm-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 380px; padding: 24px; text-align: center; }
.confirm-icon { font-size: 40px; display: block; margin-bottom: 12px; }
.confirm-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: #fff; margin-bottom: 8px; }
.confirm-msg { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-yes { flex: 1; background: #CC0000; border: none; border-radius: 8px; padding: 12px; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
.confirm-no { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--muted); font-size: 13px; cursor: pointer; }
.edit-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
.edit-modal.open { display: flex; }
.edit-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 440px; padding: 24px; max-height: 90vh; overflow-y: auto; }
.edit-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: #fff; margin-bottom: 4px; }
.edit-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
.edit-field { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.edit-field:last-of-type { border-bottom: none; }
.edit-field-label { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.edit-field-input { width: 70px; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 18px; text-align: center; outline: none; }
.edit-field-input:focus { border-color: var(--orange); }
.edit-btns { display: flex; gap: 8px; margin-top: 16px; }
.edit-save { flex: 1; background: var(--orange); border: none; border-radius: 8px; padding: 12px; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
.edit-cancel { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--muted); font-size: 13px; cursor: pointer; }

/* TICKER */
.ticker-wrap { width: 100%; background: rgba(255,107,0,0.12); border-bottom: 1px solid rgba(255,107,0,0.2); overflow: hidden; padding: 8px 0; }
.ticker { display: flex; white-space: nowrap; animation: ticker-scroll 18s linear infinite; }
.ticker:hover { animation-play-state: paused; }
.ticker-item { display: inline-flex; align-items: center; gap: 8px; padding: 0 32px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,107,0,0.9); }
.ticker-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }
@keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

/* SURPRISE BOX */
.surprise-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 36px 20px 32px; }
.surprise-overlay.open { display: flex; animation: fadeIn 0.4s ease; }
.surprise-pre { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 4px; text-align: center; }
.surprise-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; color: #fff; text-align: center; }
.surprise-nome { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--orange); text-align: center; }
.surprise-box-wrap { position: relative; cursor: pointer; transition: transform 0.15s; }
.surprise-box-wrap:hover { transform: scale(1.04); }
.surprise-box-wrap:active { transform: scale(0.97); }
.surprise-box { position: relative; width: 200px; height: 200px; }
.surprise-box-bottom { width: 200px; height: 140px; background: linear-gradient(135deg, #FF6B00, #FF4500); border-radius: 8px 8px 16px 16px; position: absolute; bottom: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(255,107,0,0.5); }
.surprise-box-ribbon-v { position: absolute; width: 28px; height: 100%; background: rgba(255,255,255,0.25); left: 50%; transform: translateX(-50%); border-radius: 4px; }
.surprise-box-ribbon-h { position: absolute; width: 100%; height: 28px; background: rgba(255,255,255,0.25); top: 50%; transform: translateY(-50%); border-radius: 4px; }
.surprise-box-lid { width: 200px; height: 60px; background: linear-gradient(135deg, #FF8C00, #FF6B00); border-radius: 12px; position: absolute; top: 0; transform-origin: left center; transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 4px 20px rgba(255,107,0,0.4); display: flex; align-items: center; justify-content: center; }
.surprise-box-lid.open { transform: rotate(-65deg) translateY(-20px); }
.surprise-box-lid-ribbon { width: 28px; height: 100%; background: rgba(255,255,255,0.3); border-radius: 4px; }
.surprise-bow { position: absolute; top: -24px; left: 50%; transform: translateX(-50%); font-size: 36px; }
.surprise-hint { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; letter-spacing: 1px; margin-top: 10px; }
.surprise-hint.hidden { visibility: hidden; }
.surprise-close { background: transparent; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 10px 28px; color: rgba(255,255,255,0.5); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.surprise-close:hover { border-color: var(--orange); color: #fff; }
.surprise-confetti-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 10001; }
